<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 215" fill="none">

  <!-- === Lignes du réseau hexagonal === -->
  <g stroke="#9CA3AF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <!-- rangée haute -->
    <line x1="100" y1="58"  x2="66"  y2="78"/>
    <line x1="100" y1="58"  x2="134" y2="78"/>
    <!-- flanc gauche -->
    <line x1="66"  y1="78"  x2="46"  y2="113"/>
    <!-- flanc droit -->
    <line x1="134" y1="78"  x2="154" y2="113"/>
    <!-- liaisons haut → centre -->
    <line x1="66"  y1="78"  x2="100" y2="97"/>
    <line x1="134" y1="78"  x2="100" y2="97"/>
    <!-- centre → milieu -->
    <line x1="100" y1="97"  x2="46"  y2="113"/>
    <line x1="100" y1="97"  x2="154" y2="113"/>
    <!-- milieu → bas-milieu -->
    <line x1="46"  y1="113" x2="100" y2="132"/>
    <line x1="154" y1="113" x2="100" y2="132"/>
    <!-- milieu → bas-flancs -->
    <line x1="46"  y1="113" x2="66"  y2="150"/>
    <line x1="154" y1="113" x2="134" y2="150"/>
    <!-- bas-milieu → bas-flancs -->
    <line x1="100" y1="132" x2="66"  y2="150"/>
    <line x1="100" y1="132" x2="134" y2="150"/>
    <!-- rangée basse -->
    <line x1="66"  y1="150" x2="100" y2="170"/>
    <line x1="134" y1="150" x2="100" y2="170"/>
  </g>

  <!-- === Nœuds (cercles blancs bordés) === -->
  <g stroke="#9CA3AF" stroke-width="1.7" fill="white">
    <circle cx="100" cy="58"  r="5.5"/>
    <circle cx="66"  cy="78"  r="5.5"/>
    <circle cx="134" cy="78"  r="5.5"/>
    <circle cx="100" cy="97"  r="5.5"/>
    <circle cx="46"  cy="113" r="5.5"/>
    <circle cx="154" cy="113" r="5.5"/>
    <circle cx="100" cy="132" r="5.5"/>
    <circle cx="66"  cy="150" r="5.5"/>
    <circle cx="134" cy="150" r="5.5"/>
    <circle cx="100" cy="170" r="5.5"/>
  </g>

  <!-- === Jauge (speedomètre) === -->
  <!-- 4 arcs concentriques, le dernier (droite) plus sombre -->
  <g fill="none" stroke-linecap="round" stroke-width="2">
    <path d="M 71 80 A 33 33 0 0 1 82 51" stroke="#BBBDC2"/>
    <path d="M 82 51 A 33 33 0 0 1 100 45" stroke="#BBBDC2"/>
    <path d="M 100 45 A 33 33 0 0 1 118 51" stroke="#BBBDC2"/>
    <path d="M 118 51 A 33 33 0 0 1 129 80" stroke="#6B7280" stroke-width="2.4"/>
  </g>
  <!-- Aiguille -->
  <line x1="100" y1="80" x2="122" y2="54" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Pivot -->
  <circle cx="100" cy="80" r="4.5" stroke="#6B7280" stroke-width="1.8" fill="white"/>

  <!-- === Courbe de signal (waveform) === -->
  <path d="
    M 38 113
    C 47 113, 50  90, 58  90
    C 66  90, 68 136, 77 136
    C 85 136, 88  92, 96  92
    C 100 92, 102 130, 110 130
    C 118 130, 120  90, 129  90
    C 137  90, 139 136, 148 136
    C 156 136, 158 113, 162 113
  " stroke="#1F2937" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ombre portée -->
  <ellipse cx="100" cy="204" rx="36" ry="6.5" fill="#00000012"/>

</svg>
